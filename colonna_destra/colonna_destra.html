<link rel="stylesheet" href="/colonna_destra/colonna_destra.css">

<aside class="sidebar_right" id="sidebar_right">
     <h1 class="h1_indice">Accessibilità</h1>
     <div class="contenuto_destra" id="contenuto_destra">
          <h2 class="h2_indice">Font</h2>
          <label class="container">
               <h3>OpenDyslexic</h3>
               <input type="radio" name="font" id="OpenDyslexic">
               <span class="checkmark"></span>
          </label>
          <label class="container">
               <h3>Standard</h3>
               <input type="radio" name="font" id="StandardFont">
               <span class="checkmark"></span>
          </label>

          <h2 class="h2_indice">Contrasto</h2>
          <label class="container">
               <h3>Elevato</h3>
               <input type="radio" name="contrasto" id="HighContrast">
               <span class="checkmark"></span>
          </label>
          <label class="container">
               <h3>Standard</h3>
               <input type="radio" name="contrasto" id="StandardContrast">
               <span class="checkmark"></span>
          </label>

          <h2 class="h2_indice">Dimensione testo</h2>
          <label class="container">
               <h3>Enorme</h3>
               <input type="radio" name="dimensione" id="HugeText">
               <span class="checkmark"></span>
          </label>
          <label class="container">
               <h3>Grande</h3>
               <input type="radio" name="dimensione" id="BigText">
               <span class="checkmark"></span>
          </label>
          <label class="container">
               <h3>Standard</h3>
               <input type="radio" name="dimensione" id="NormalText">
               <span class="checkmark"></span>
          </label>
     </div>
</aside>
